# MetaHarness integration gates — ADR-150 Phase 1 MVP.
#
# Three jobs, all fast (subprocess invocations of `npx metaharness`):
#   1. score              — fail if ruflo's own harnessFit drops below 70
#   2. mcp-scan           — fail on any HIGH-severity MCP finding in ruflo
#   3. router-compat      — exercise `@metaharness/router.Router` constructor;
#                            catches breaking API changes before publish
#
# Triggers on changes that could move any of these signals:
#   - the ruflo-metaharness plugin
#   - the @metaharness/router optional dep version in v3/@claude-flow/cli
#   - the v3 ruvector router-trajectory + neural-router source
#   - this workflow file
name: metaharness-ci

on:
  push:
    branches: [main]
    paths:
      - 'plugins/ruflo-metaharness/**'
      - 'v3/@claude-flow/cli/package.json'
      - 'v3/@claude-flow/cli/src/ruvector/neural-router.ts'
      - 'v3/@claude-flow/cli/src/ruvector/router-trajectory.ts'
      - 'scripts/check-metaharness-compat.mjs'
      - '.github/workflows/metaharness-ci.yml'
  pull_request:
    paths:
      - 'plugins/ruflo-metaharness/**'
      - 'v3/@claude-flow/cli/package.json'
      - 'v3/@claude-flow/cli/src/ruvector/neural-router.ts'
      - 'v3/@claude-flow/cli/src/ruvector/router-trajectory.ts'
      - 'scripts/check-metaharness-compat.mjs'
      - '.github/workflows/metaharness-ci.yml'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Plugin structural smoke
        run: bash plugins/ruflo-metaharness/scripts/smoke.sh

      - name: harness-score against ruflo (alert on harnessFit < 70)
        run: |
          node plugins/ruflo-metaharness/scripts/score.mjs \
            --path . \
            --alert-on-fit-below 70 \
            --format json > /tmp/metaharness-score.json
          cat /tmp/metaharness-score.json

      - name: Upload score artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaharness-score
          path: /tmp/metaharness-score.json
          retention-days: 30

      - name: harness-genome against ruflo (alert on risk_score > 0.5)
        run: |
          node plugins/ruflo-metaharness/scripts/genome.mjs \
            --path . \
            --alert-on-risk-above 0.5 \
            --format json > /tmp/metaharness-genome.json
          cat /tmp/metaharness-genome.json

      - name: Upload genome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaharness-genome
          path: /tmp/metaharness-genome.json
          retention-days: 30

  mcp-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: harness mcp-scan against ruflo (fail on HIGH findings)
        run: |
          # Exit 0 on no/low-severity findings; exit 1 on HIGH.
          # Exit 0 also when metaharness is unavailable — ADR-150
          # graceful-degradation rule #3 lets ruflo continue without it.
          node plugins/ruflo-metaharness/scripts/mcp-scan.mjs \
            --path . \
            --fail-on high \
            --format json > /tmp/metaharness-mcp-scan.json
          cat /tmp/metaharness-mcp-scan.json

      - name: Upload mcp-scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaharness-mcp-scan
          path: /tmp/metaharness-mcp-scan.json
          retention-days: 30

  router-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compat check against current @metaharness/router pin
        # Exercises the Router constructor, fromExamples factory, and
        # routedBy field shape. If any of these change in @metaharness/
        # router@0.4.x, this fails BEFORE we publish a ruflo release
        # that would break neural-router.ts at runtime.
        run: node scripts/check-metaharness-compat.mjs

      - name: Parallel-pipeline e2e integration test (ADR-150 iter 13)
        # Exercises recorder TS module ↔ JSONL ↔ analyzer composition.
        # 25 assertions including the exact 3 thresholds from
        # ADR-150 review-round-1, plus --strict semantics for both
        # promotable and non-promotable paths.
        run: node plugins/ruflo-metaharness/scripts/test-parallel-pipeline.mjs

      - name: MCP tool runtime contract test (ADR-150 iter 23)
        # Builds the CLI dist, imports metaharnessTools, invokes every
        # handler with minimal input, asserts each returns the
        # {success, data, degraded, exitCode} contract without throwing.
        # 65 assertions across 7 tools. Slow path (~50s) due to npx
        # warmup; runs only on PRs that touched the MCP wiring.
        run: |
          cd v3/@claude-flow/cli
          npm install --no-audit --no-fund --ignore-scripts --silent
          npm run build
          cd ../../..
          node plugins/ruflo-metaharness/scripts/test-mcp-tools.mjs

      - name: Regression gate — iter-12 dispatch overhead < 500ns (iter 24/25)
        # Micro-benchmark proving the iter-12 "zero default-path overhead"
        # claim with measured numbers. Threshold 500ns chosen as ~3.5x
        # headroom over the iter-24 baseline of ~147ns on Apple Silicon
        # /Node 22. Fails the PR if someone accidentally inflates the
        # route() hot path on the default path.
        run: |
          node plugins/ruflo-metaharness/scripts/bench-recordpair-overhead.mjs \
            --max-overhead-ns 500 --format json > /tmp/bench-overhead.json
          # Pretty-print the verdict
          node -e "
            const r = JSON.parse(require('fs').readFileSync('/tmp/bench-overhead.json'));
            const baseline = r.results.find(x => x.label.startsWith('baseline'));
            const env = r.results.find(x => x.label.includes('FLAG OFF'));
            const overhead = env.meanNsPerCall - baseline.meanNsPerCall;
            console.log('Measured overhead:', Math.round(overhead) + 'ns per route() call');
            console.log('Threshold: 500ns. Headroom: ' + Math.round(500 - overhead) + 'ns');
          "

      - name: Upload benchmark artifact (90-day retention for trend tracking)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaharness-bench-overhead-${{ github.run_id }}
          path: /tmp/bench-overhead.json
          retention-days: 90

  eject-dryrun:
    # ADR-150 Phase 2 — verify `ruflo eject` dry-run produces a valid
    # plan against the ruflo repo itself, AND that the safety gate
    # rejects --target paths inside the repo. The actual eject is
    # never executed in CI; only the dry-run path + safety gates.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CLI to dist
        # The eject command lives in v3/@claude-flow/cli/src/commands/.
        # CI doesn't have the bundled dist; build it here.
        run: |
          cd v3/@claude-flow/cli
          npm install --no-audit --no-fund --ignore-scripts --silent
          npm run build

      - name: eject dry-run produces a valid plan
        run: |
          set -e
          # Run via the built bin
          OUT=$(node v3/@claude-flow/cli/bin/cli.js eject --name my-test-harness --format json 2>&1 || true)
          echo "$OUT" | head -20
          # Must contain the dry-run plan + dryRun:true
          echo "$OUT" | grep -q '"dryRun"' || { echo "FAIL: eject dry-run did not emit dryRun:true"; exit 1; }
          echo "$OUT" | grep -q '"name": "my-test-harness"' || { echo "FAIL: name not in plan"; exit 1; }
          echo "✓ eject dry-run plan validates"

      - name: eject refuses --target inside the repo (safety gate)
        run: |
          set -e
          OUT=$(node v3/@claude-flow/cli/bin/cli.js eject --name foo --target "$PWD/eject-test" --confirm 2>&1 || true)
          echo "$OUT" | head -10
          echo "$OUT" | grep -qi "refusing to write\|target-inside-repo" || {
            echo "FAIL: eject should refuse --target inside the repo"
            exit 1
          }
          echo "✓ eject correctly refused in-repo target"

  similarity-tests:
    # iter 40 — direct CI gate on the ADR-152 §3.1 contract.
    # Runs without any @metaharness/* installed — the production module is
    # pure-TS and must work in that environment (architectural constraint #4).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Unit tests — _similarity.mjs (iter 39, 53 assertions)
        run: node plugins/ruflo-metaharness/scripts/test-similarity.mjs

      - name: Spike invariants still hold (iter 35 regression anchor)
        run: node plugins/ruflo-metaharness/scripts/_spike-similarity.mjs

      - name: CLI skill — file-input round-trip
        run: |
          set -e
          cat > /tmp/a.json <<'JSON'
          {"score":{"harnessFit":78,"compileConfidence":92,"taskCoverage":65,"toolSafety":88,"memoryUsefulness":70,"estCostPerRunUsd":0.04,"recommendedMode":"CLI + MCP","archetype":"compliance-harness","template":"vertical:legal"},"genome":{"repo_type":"node_mcp_ci","agent_topology":["a1","a2","a3","a4"],"risk_score":0.45,"test_confidence":0.7,"publish_readiness":0.6}}
          JSON
          cat > /tmp/b.json <<'JSON'
          {"score":{"harnessFit":75,"compileConfidence":90,"taskCoverage":70,"toolSafety":90,"memoryUsefulness":72,"estCostPerRunUsd":0.05,"recommendedMode":"CLI + MCP","archetype":"compliance-harness","template":"vertical:support"},"genome":{"repo_type":"node_mcp_ci","agent_topology":["b1","b2","b3","a3","a4"],"risk_score":0.40,"test_confidence":0.75,"publish_readiness":0.65}}
          JSON
          OUT=$(node plugins/ruflo-metaharness/scripts/similarity.mjs --a /tmp/a.json --b /tmp/b.json --format json)
          echo "$OUT"
          echo "$OUT" | grep -q '"overall"' || { echo "FAIL: no overall field"; exit 1; }
          echo "✓ similarity skill emits valid JSON"

      - name: audit-trend structural-distance integration (iter 38)
        run: |
          set -e
          cat > /tmp/audit-baseline.json <<'JSON'
          {"startedAt":"2026-06-15T00:00:00Z","composite":{"worst":"clean"},"components":{"oiaManifest":{},"threatModel":{},"mcpScan":{"json":{"findings":[]}}},"fingerprint":{"score":{"harnessFit":82,"recommendedMode":"CLI + MCP","archetype":"typescript-sdk-harness","template":"vertical:coding"},"genome":{"repo_type":"node_mcp_ci","agent_topology":["maintainer","tester","security","release"],"risk_score":0.3,"test_confidence":0.85,"publish_readiness":0.9}}}
          JSON
          cat > /tmp/audit-current.json <<'JSON'
          {"startedAt":"2026-06-16T00:00:00Z","composite":{"worst":"low"},"components":{"oiaManifest":{},"threatModel":{},"mcpScan":{"json":{"findings":[]}}},"fingerprint":{"score":{"harnessFit":75,"recommendedMode":"CLI + MCP","archetype":"typescript-sdk-harness","template":"vertical:coding"},"genome":{"repo_type":"node_mcp_ci","agent_topology":["maintainer","tester","security","release","experimental"],"risk_score":0.35,"test_confidence":0.78,"publish_readiness":0.85}}}
          JSON
          OUT=$(node plugins/ruflo-metaharness/scripts/audit-trend.mjs --baseline /tmp/audit-baseline.json --current /tmp/audit-current.json --format json)
          echo "$OUT" | python3 -c "import json,sys; d=json.load(sys.stdin); sd=d['delta']['structuralDistance']; assert sd['verdict'] in ('near-identical','minor-drift'), sd; assert 0 < sd['distance'] < 0.2, sd; print('✓ structural-distance:', sd['verdict'], 'distance=' + str(sd['distance']))"

      - name: Graceful fallback when fingerprint missing
        run: |
          set -e
          cat > /tmp/audit-old.json <<'JSON'
          {"startedAt":"2026-06-01T00:00:00Z","composite":{"worst":"clean"},"components":{"oiaManifest":{},"threatModel":{},"mcpScan":{"json":{"findings":[]}}}}
          JSON
          cat > /tmp/audit-new.json <<'JSON'
          {"startedAt":"2026-06-16T00:00:00Z","composite":{"worst":"clean"},"components":{"oiaManifest":{},"threatModel":{},"mcpScan":{"json":{"findings":[]}}},"fingerprint":{"score":{"harnessFit":82},"genome":{"repo_type":"node_mcp_ci","agent_topology":["x"]}}}
          JSON
          OUT=$(node plugins/ruflo-metaharness/scripts/audit-trend.mjs --baseline /tmp/audit-old.json --current /tmp/audit-new.json --format json)
          echo "$OUT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['delta']['structuralDistance']['verdict']=='unavailable', d['delta']['structuralDistance']; print('✓ graceful fallback when fingerprint absent')"

      - name: Distance alert gate exits 1 below threshold
        run: |
          set -e
          # The fixtures from the previous step produce overall ~0.97;
          # threshold 0.99 must trigger exit 1.
          if node plugins/ruflo-metaharness/scripts/audit-trend.mjs \
            --baseline /tmp/audit-baseline.json \
            --current /tmp/audit-current.json \
            --alert-on-distance-below 0.99 > /tmp/trend-alert.txt 2>&1; then
            echo "FAIL: --alert-on-distance-below should have exited 1"
            cat /tmp/trend-alert.txt
            exit 1
          else
            echo "✓ structural-distance alert correctly exited non-zero (got $?)"
          fi

